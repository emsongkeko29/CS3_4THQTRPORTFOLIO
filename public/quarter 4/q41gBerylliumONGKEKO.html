<!DOCTYPE html>
<html>
<head>
    <title>Movie Tracker - Exercise 2</title>
    <style>
        /* page styling to make the content centered */
        body {font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f9f9f9;}
        
        /* container for the form */
        .movie-container {width: 400px; border: 1px solid #ddd; padding: 20px; border-radius: 10px; box-shadow: 2px 2px 10px #ccc; background: white; margin-top: 20px;}
        
        /* makes inputs and selects full width */
        input, select {width: 100%; padding: 8px; margin: 10px 0; display: block; box-sizing: border-box;}
        label {font-weight: bold;}

        /* rating system */
        .rating-box {direction: rtl; display: inline-block;}
        .rating-box input { display: none;}
        .rating-box label {font-size: 30px; color: lightgray; cursor: pointer;}
        .rating-box input:checked ~ label {color: gold;}

        /* Blue Add Movie button */
        .add-btn {width: 100%; background-color: #007bff; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;}
        
        /* movie list items */
        .item {border: 1px solid #eee; padding: 10px; margin-top: 10px; border-radius: 5px; background: #fafafa; display: flex; justify-content: space-between; align-items: center;}
        .gold {color: gold;}

        /* delete button styling */
        .del-btn {background-color: #f2f2f2; border: 1px solid #ccc; padding: 5px 10px; cursor: pointer; border-radius: 4px;}
        .del-btn:hover {background-color: #e0e0e0;}
    </style>
</head>
<body>

    <div class="movie-container">
        <h2 style="text-align: center;">Add / Update a Movie Rating</h2>
        
        <label>Title:</label>
        <input type="text" id="movieTitle">

        <label>Year:</label>
        <input type="text" id="movieYear">

        <label>Genre:</label>
        <select id="movieGenre">
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
        </select>

        <label>Rating:</label><br>
        <div class="rating-box">
            <input type="radio" name="star" id="str5" value="5"><label for="str5">★</label>
            <input type="radio" name="star" id="str4" value="4"><label for="str4">★</label>
            <input type="radio" name="star" id="str3" value="3"><label for="str3">★</label>
            <input type="radio" name="star" id="str2" value="2"><label for="str2">★</label>
            <input type="radio" name="star" id="str1" value="1"><label for="str1">★</label>
        </div>

        <button class="add-btn" onclick="addMovie()">Add Movie</button>

        <h2 style="text-align: center;">Movie List</h2>
        <div id="displayArea"></div>
    </div>

    <script>
        // load list
        showMovies();

        function addMovie() {
            var title = document.getElementById("movieTitle").value;
            var year = document.getElementById("movieYear").value;
            var genre = document.getElementById("movieGenre").value;
            
            // 1. get rating
            var rating = 0;
            var stars = document.getElementsByName("star");
            for (var i = 0; i < stars.length; i++) {
                if (stars[i].checked) {
                    rating = parseInt(stars[i].value);
                }
            }

            // validation
            if (title == "" || year == "" || rating == 0) {
                alert("Please fill in all fields and pick a rating!");
                return;
            }

            // 2. get list from LocalStorage
            var currentList = localStorage.getItem("movies");
            var movieArray = currentList ? JSON.parse(currentList) : [];

            // 3. update
            var found = false;
            for (var i = 0; i < movieArray.length; i++) {
                if (movieArray[i].title.toLowerCase() === title.toLowerCase()) {
                    // update the year and genre
                    movieArray[i].year = year;
                    movieArray[i].genre = genre;
                    // average the star rating: (Old + New) / 2
                    movieArray[i].rating = (parseFloat(movieArray[i].rating) + rating) / 2;
                    found = true;
                    break;
                }
            }

            // 4. if not found, add as a new movie
            if (!found) {
                var movieObject = {
                    title: title,
                    year: year,
                    genre: genre,
                    rating: rating
                };
                movieArray.push(movieObject);
            }

            // 5. save back to storage
            localStorage.setItem("movies", JSON.stringify(movieArray));

            // clear inputs 
            document.getElementById("movieTitle").value = "";
            document.getElementById("movieYear").value = "";
            showMovies();
        }

        // DELETE
        function deleteMovie(index) {
            // Ask for confirmation first
            var confirmed = confirm("Are you sure you want to delete?");
            if (confirmed) {
                var data = localStorage.getItem("movies");
                var movieArray = JSON.parse(data);
                
                // remove the movie at that index
                movieArray.splice(index, 1);
                
                // save and refresh
                localStorage.setItem("movies", JSON.stringify(movieArray));
                showMovies();
            }
        }

        function showMovies() {
            var display = document.getElementById("displayArea");
            display.innerHTML = ""; 

            var data = localStorage.getItem("movies");
            if (data != null) {
                var movieArray = JSON.parse(data);

                for (var i = 0; i < movieArray.length; i++) {
                    var m = movieArray[i];
                    
                    // create star display 
                    var starDisplay = "";
                    var roundedStars = Math.round(m.rating);
                    for (var s = 1; s <= 5; s++) {
                        if (s <= roundedStars) {
                            starDisplay += "<span class='gold'>★</span>";
                        } else {
                            starDisplay += "<span>★</span>";
                        }
                    }

                    // add item & delete button
                    display.innerHTML += "<div class='item'>" + 
                        "<span>" + m.title + " (" + m.year + ") - " + m.genre + ", Rating: " + starDisplay + "</span>" +
                        "<button class='del-btn' onclick='deleteMovie(" + i + ")'>Delete</button>" +
                        "</div>";
                }
            }
        }
    </script>
</body>
</html>
