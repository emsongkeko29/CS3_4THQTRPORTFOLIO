<!DOCTYPE html>
<html>
<head>
    <title>q41gSectionLN</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
        .movie-container { width: 400px; border: 1px solid #ddd; padding: 20px; border-radius: 10px; box-shadow: 2px 2px 10px #ccc; }
        
        input, select { width: 100%; padding: 8px; margin: 10px 0; display: block; }
        label { font-weight: bold; }

        .rating-box { direction: rtl; display: inline-block; }
        .rating-box input { display: none; }
        .rating-box label { font-size: 30px; color: lightgray; cursor: pointer; }
        .rating-box input:checked ~ label { color: gold; }

        button { width: 100%; background-color: #007bff; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        
        .item { border: 1px solid #eee; padding: 10px; margin-top: 10px; border-radius: 5px; background: #fafafa; }
        .gold { color: gold; }
    </style>
</head>
<body>

    <div class="movie-container">
        <h1 style="text-align: center;">Add a Movie</h1>
        
        <label>Title:</label>
        <input type="text" id="movieTitle">

        <label>Year:</label>
        <input type="text" id="movieYear">

        <label>Genre:</label>
        <select id="movieGenre">
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
        </select>

        <label>Rating:</label><br>
        <div class="rating-box">
            <input type="radio" name="star" id="str5" value="5"><label for="str5">★</label>
            <input type="radio" name="star" id="str4" value="4"><label for="str4">★</label>
            <input type="radio" name="star" id="str3" value="3"><label for="str3">★</label>
            <input type="radio" name="star" id="str2" value="2"><label for="str2">★</label>
            <input type="radio" name="star" id="str1" value="1"><label for="str1">★</label>
        </div>

        <button onclick="addMovie()">Add Movie</button>

        <h2 style="text-align: center;">Movie List</h2>
        <div id="displayArea"></div>
    </div>

    <script>
        showMovies();

        function addMovie() {
            // get values
            var title = document.getElementById("movieTitle").value;
            var year = document.getElementById("movieYear").value;
            var genre = document.getElementById("movieGenre").value;
            
            // get the rating 
            var rating = 0;
            var stars = document.getElementsByName("star");
            for (var i = 0; i < stars.length; i++) {
                if (stars[i].checked) {
                    rating = stars[i].value;
                }
            }

            // javascript object
            var movieObject = {
                title: title,
                year: year,
                genre: genre,
                rating: rating
            };

            var currentList = localStorage.getItem("movies");
            var movieArray;

            if (currentList == null) {
                movieArray = [];
            } else {
                movieArray = JSON.parse(currentList);
            }

            // add new object
            movieArray.push(movieObject);
            localStorage.setItem("movies", JSON.stringify(movieArray));

            // clear inputs
            document.getElementById("movieTitle").value = "";
            document.getElementById("movieYear").value = "";
            showMovies();
        }

        function showMovies() {
            var display = document.getElementById("displayArea");
            display.innerHTML = ""; // clear the list

            var data = localStorage.getItem("movies");
            if (data != null) {
                var movieArray = JSON.parse(data);

                // loop thru the array
                for (var i = 0; i < movieArray.length; i++) {
                    var m = movieArray[i];
                    
                    // make stars
                    var starDisplay = "";
                    for (var s = 1; s <= 5; s++) {
                        if (s <= m.rating) {
                            starDisplay += "<span class='gold'>★</span>";
                        } else {
                            starDisplay += "<span>★</span>";
                        }
                    }

                    display.innerHTML += "<div class='item'>" + 
                        m.title + " (" + m.year + ") - " + m.genre + ", Rating: " + starDisplay + 
                        "</div>";
                }
            }
        }
    </script>
</body>
</html>
